<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventBot</title>
  <style>
    :root {
      --primary-color: #3a86ff;
      --dark-bg: #121212;
      --dark-surface: #1e1e1e;
      --dark-card: #252525;
      --border-color: #333;
      --text-primary: #fff;
      --text-secondary: #e0e0e0;
      --bot-message-bg: #2a2d3e;
      --user-message-bg: #3a86ff;
      --bot-text: #e0e0e0;
      --user-text: #fff;
      --transition-speed: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(58, 134, 255, 0.22), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(58, 134, 255, 0.12), transparent 55%),
        var(--dark-bg);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      color-scheme: dark;
    }

    #top-bar {
      background: rgba(37, 37, 37, 0.85);
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-color);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background:
        radial-gradient(12px 12px at 35% 35%, rgba(255, 255, 255, 0.7), transparent 60%),
        linear-gradient(135deg, rgba(58, 134, 255, 1), rgba(58, 134, 255, 0.65));
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: rgba(224, 224, 224, 0.75);
    }

    #settings-btn {
      background: transparent;
      border: none;
      color: rgba(224, 224, 224, 0.85);
      cursor: default;
      padding: 8px;
      border-radius: 10px;
      transition: background-color var(--transition-speed);
      opacity: 0.7;
    }

    #settings-btn:hover {
      background-color: rgba(255, 255, 255, 0.06);
    }

    #chat-container {
      flex: 1;
      margin: 72px auto 96px auto;
      max-width: 920px;
      width: 100%;
      overflow-y: auto;
      padding: 0 16px;
      scroll-behavior: smooth;
    }

    #chat-messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      border: 1px solid rgba(51, 51, 51, 0.9);
      border-radius: 16px;
      background: rgba(30, 30, 30, 0.72);
    }

    .message-wrapper {
      display: flex;
      gap: 12px;
      max-width: min(78%, 680px);
    }

    .bot-wrapper {
      align-self: flex-start;
    }

    .user-wrapper {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-column {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .bot-avatar {
      background-color: var(--bot-message-bg);
      color: var(--bot-text);
    }

    .user-avatar {
      background-color: var(--user-message-bg);
      color: var(--user-text);
    }

    .message {
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 15px;
      animation: fadeIn 0.25s ease;
      max-width: 100%;
      line-height: 1.5;
      border: 1px solid rgba(255, 255, 255, 0.05);
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .user-message {
      background: linear-gradient(135deg, rgba(58, 134, 255, 1), rgba(58, 134, 255, 0.78));
      border-top-right-radius: 6px;
    }

    .bot-message {
      background: rgba(42, 45, 62, 0.95);
      color: var(--bot-text);
      border-top-left-radius: 6px;
    }

    .timestamp {
      font-size: 12px;
      color: rgba(224, 224, 224, 0.55);
    }

    .bot-wrapper .timestamp {
      text-align: left;
      padding-left: 2px;
    }

    .user-wrapper .timestamp {
      text-align: right;
      padding-right: 2px;
    }

    #input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding: 14px 16px;
      border-top: 1px solid rgba(51, 51, 51, 0.9);
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(10px);
    }

    #input-container {
      max-width: 920px;
      display: flex;
      width: 100%;
      gap: 10px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      flex: 1;
    }

    #user-input {
      width: 100%;
      padding: 14px 44px 14px 14px;
      border-radius: 14px;
      border: 1px solid rgba(51, 51, 51, 0.95);
      background: rgba(37, 37, 37, 0.95);
      color: white;
      font-size: 15px;
      transition: border-color var(--transition-speed), background-color var(--transition-speed);
    }

    #user-input:focus {
      outline: none;
      border-color: rgba(58, 134, 255, 0.9);
      background: rgba(37, 37, 37, 1);
    }

    #user-input::placeholder {
      color: rgba(224, 224, 224, 0.55);
    }

    .btn {
      padding: 12px;
      background: transparent;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: background-color var(--transition-speed), transform var(--transition-speed);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:focus-visible {
      outline: 2px solid rgba(58, 134, 255, 0.7);
      outline-offset: 2px;
    }

    .btn-primary {
      background: var(--primary-color);
    }

    #send-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      padding: 8px;
    }

    #menu-container {
      display: flex;
      flex-shrink: 0;
    }

    #start-over-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.06);
      transition: background-color var(--transition-speed);
    }

    #start-over-btn:hover {
      background: rgba(255, 255, 255, 0.10);
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      background-color: var(--bot-message-bg);
      border-radius: 18px;
      width: fit-content;
      margin-top: 10px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background-color: #aaa;
      border-radius: 50%;
      animation: typingAnimation 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) {
      animation-delay: 0s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingAnimation {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .suggestion-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .suggestion-chip {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      transition: background-color var(--transition-speed), border-color var(--transition-speed);
      border: 1px solid rgba(51, 51, 51, 0.95);
      user-select: none;
    }

    .suggestion-chip:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(58, 134, 255, 0.35);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 768px) {
      #chat-container {
        margin-bottom: 88px;
      }
      
      .message-wrapper {
        max-width: 100%;
      }
      
      #start-over-btn span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="top-bar">
    <div class="logo-container">
      <div class="logo"></div>
      <div>
        <h2>EventBot</h2>
        <div class="subtitle">Plan smarter, faster</div>
      </div>
    </div>
    <button id="settings-btn" aria-label="Settings" title="Settings (coming soon)" type="button">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>

  <div id="chat-container">
    <div id="chat-messages">
      <!-- Messages will be inserted here -->
    </div>
  </div>

  <div id="input-area">
    <div id="input-container">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Ask about budgets, timelines, staff ratios…" autocomplete="off" />
        <button id="send-btn" class="btn" aria-label="Send message" type="button">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      
      <div id="menu-container">
        <button id="start-over-btn" class="btn" aria-label="Reset conversation" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v6h6"></path>
            <path d="M3 13a9 9 0 1 0 3-7.7L3 8"></path>
          </svg>
          <span>Reset</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const CHAT_MEMORY_KEY = "eventbot_memory";
      const DEFAULT_SUGGESTIONS = [
        "Budget for 120 guests in INR",
        "Event planning timeline",
        "How many staff for 200 people?",
        "Create a basic event checklist"
      ];

      const chatContainer = document.getElementById("chat-container");
      const chatMessages = document.getElementById("chat-messages");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");
      const resetBtn = document.getElementById("start-over-btn");

      function getCurrentTime() {
        const now = new Date();
        return now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function scrollToBottom(smooth = true) {
        if (smooth) {
          chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: "smooth" });
          return;
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function getMemory() {
        try {
          const raw = localStorage.getItem(CHAT_MEMORY_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(parsed)) return [];
          return parsed;
        } catch {
          return [];
        }
      }

      function setMemory(items) {
        localStorage.setItem(CHAT_MEMORY_KEY, JSON.stringify(items));
      }

      function clearMemory() {
        localStorage.removeItem(CHAT_MEMORY_KEY);
      }

      function createMessageElement({ sender, message, time }) {
        const wrapper = document.createElement("div");
        wrapper.className = `message-wrapper ${sender === "user" ? "user-wrapper" : "bot-wrapper"}`;

        const avatar = document.createElement("div");
        avatar.className = `avatar ${sender === "user" ? "user-avatar" : "bot-avatar"}`;
        avatar.textContent = sender === "user" ? "U" : "E";

        const column = document.createElement("div");
        column.className = "message-column";

        const bubble = document.createElement("div");
        bubble.className = `message ${sender === "user" ? "user-message" : "bot-message"}`;
        bubble.textContent = message;

        const timestamp = document.createElement("div");
        timestamp.className = "timestamp";
        timestamp.textContent = time || getCurrentTime();

        column.appendChild(bubble);
        column.appendChild(timestamp);

        wrapper.appendChild(avatar);
        wrapper.appendChild(column);

        return { wrapper, column, bubble };
      }

      function addSuggestionChips(targetColumn, suggestions) {
        if (!targetColumn || !Array.isArray(suggestions) || suggestions.length === 0) return;

        const chipsContainer = document.createElement("div");
        chipsContainer.className = "suggestion-chips";

        suggestions.forEach((text) => {
          const chip = document.createElement("div");
          chip.className = "suggestion-chip";
          chip.textContent = text;
          chip.addEventListener("click", () => {
            userInput.value = text;
            userInput.focus();
            sendMessage();
          });
          chipsContainer.appendChild(chip);
        });

        targetColumn.appendChild(chipsContainer);
      }

      function showTypingIndicator() {
        removeTypingIndicator();

        const wrapper = document.createElement("div");
        wrapper.id = "typing-indicator";
        wrapper.className = "message-wrapper bot-wrapper";

        const avatar = document.createElement("div");
        avatar.className = "avatar bot-avatar";
        avatar.textContent = "E";

        const column = document.createElement("div");
        column.className = "message-column";

        const typing = document.createElement("div");
        typing.className = "typing-indicator";
        for (let i = 0; i < 3; i++) {
          const dot = document.createElement("div");
          dot.className = "typing-dot";
          typing.appendChild(dot);
        }

        column.appendChild(typing);
        wrapper.appendChild(avatar);
        wrapper.appendChild(column);
        chatMessages.appendChild(wrapper);
        scrollToBottom(true);
      }

      function removeTypingIndicator() {
        const indicator = document.getElementById("typing-indicator");
        if (indicator) indicator.remove();
      }

      function addMessage({ sender, message, time }, { save = true, smoothScroll = true } = {}) {
        const { wrapper, column } = createMessageElement({ sender, message, time });
        chatMessages.appendChild(wrapper);
        scrollToBottom(smoothScroll);

        if (save) {
          const memory = getMemory();
          memory.push({ sender, message, time: time || getCurrentTime() });
          setMemory(memory);
        }

        return column;
      }

      function renderFromMemory() {
        chatMessages.innerHTML = "";
        const memory = getMemory();
        for (const item of memory) {
          if (!item || !item.sender || typeof item.message !== "string") continue;
          addMessage(
            { sender: item.sender, message: item.message, time: item.time },
            { save: false, smoothScroll: false }
          );
        }
        scrollToBottom(false);
        return memory.length > 0;
      }

      function renderWelcome() {
        chatMessages.innerHTML = "";
        const column = addMessage(
          {
            sender: "bot",
            message: "Hi — I’m EventBot. Ask me about budgets, timelines, staffing, or checklists for your event.",
            time: getCurrentTime()
          },
          { save: false, smoothScroll: false }
        );
        addSuggestionChips(column, DEFAULT_SUGGESTIONS);
        scrollToBottom(false);
      }

      function setSending(isSending) {
        sendBtn.disabled = isSending;
        userInput.disabled = isSending;
        sendBtn.style.opacity = isSending ? "0.65" : "1";
      }

      async function sendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        const historyForApi = getMemory().map(({ sender, message }) => ({ sender, message }));

        addMessage({ sender: "user", message: query, time: getCurrentTime() }, { save: true });
        userInput.value = "";
        userInput.focus();

        setSending(true);
        showTypingIndicator();

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, history: historyForApi })
          });

          const data = await res.json();
          removeTypingIndicator();
          addMessage(
            { sender: "bot", message: (data && data.response) || "No response received.", time: getCurrentTime() },
            { save: true }
          );
        } catch {
          removeTypingIndicator();
          addMessage(
            {
              sender: "bot",
              message: "Sorry — I couldn’t reach the server. Please try again.",
              time: getCurrentTime()
            },
            { save: false }
          );
        } finally {
          setSending(false);
        }
      }

      function resetConversation() {
        clearMemory();
        renderWelcome();
        userInput.value = "";
        userInput.focus();
      }

      // Wire up events
      sendBtn.addEventListener("click", sendMessage);
      resetBtn.addEventListener("click", resetConversation);
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        const hadHistory = renderFromMemory();
        if (!hadHistory) renderWelcome();
        userInput.focus();
      });
    })();

  </script>
</body>
</html>
